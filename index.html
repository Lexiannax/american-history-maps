    --confederate-gray: #6b6b5a;
    --free-gold: #c8902a;
    --slave-brown: #5c3010;
    --accent-red: #9b2020;
    --neutral-tan: #b8956a;
    --territory-green: #3a5c3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page-wrapper {
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(200,144,42,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.03) 0%, transparent 60%),
      var(--parchment);
    min-height: 100vh;
    position: relative;
  }

  .page-wrapper::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:

    pointer-events: none;

    opacity: 0.6;
  }

  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    border-bottom: 4px solid var(--parchment-shadow);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(

  .header-ornament {

  }

  }

  h1 span {
    color: var(--parchment-shadow);
    display: block;
    font-size: 0.55em;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.05em;
    margin-top: 0.3rem;
  }

  .header-rule {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--parchment-shadow), transparent);

  }

  .header-subtitle {
    font-size: 0.95rem;
    color: rgba(245,234,214,0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  /* TIMELINE NAV */
  .timeline-nav {
    display: flex;
    overflow-x: auto;
    gap: 0;
    padding: 1.5rem 0;
    border-bottom: 2px solid var(--parchment-shadow);
    margin-bottom: 2rem;
    scrollbar-width: thin;
    scrollbar-color: var(--parchment-shadow) transparent;
    position: relative;
  }

  .timeline-nav::before {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    height: 1px;
    background: var(--parchment-dark);
  }

  .era-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.8rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    position: relative;
    transition: all 0.3s ease;
    min-width: 130px;
  }

  .era-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: var(--blood);
    transition: width 0.3s ease;
  }

  .era-btn.active::after { width: 80%; }
  .era-btn.active .era-dot { background: var(--blood); transform: scale(1.3); }

  .era-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--parchment-shadow);
    border: 2px solid var(--ink);
    transition: all 0.3s ease;
  }

  .era-year {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .era-label {
    font-size: 0.7rem;
    color: #666;
    text-align: center;
    line-height: 1.2;
    max-width: 110px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .era-btn.active .era-year { color: var(--blood); }
  .era-btn.active .era-label { color: var(--ink); }
  .era-btn:hover .era-dot { background: var(--neutral-tan); transform: scale(1.1); }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
    align-items: start;
  }

  @media (max-width: 900px) {
    .content-grid { grid-template-columns: 1fr; }
  }

  /* MAP PANEL */
  .map-panel {
    background: var(--parchment-dark);
    border: 2px solid var(--parchment-shadow);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    box-shadow: 4px 4px 20px rgba(26,18,8,0.2);
  }

  .map-title-bar {
    background: var(--ink);
    color: var(--parchment);
    padding: 0.7rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .map-title-bar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
  }

  .map-year-badge {
    background: var(--blood);
    color: var(--parchment);
    padding: 0.2rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    border-radius: 2px;

  #map-container {
    width: 100%;
    background: #c8dde8;
    position: relative;
  }

  #map-container svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .map-legend {
    padding: 0.8rem 1rem;
    background: var(--parchment);
    border-top: 1px solid var(--parchment-shadow);
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--ink);
  }

  .legend-swatch {
    width: 16px;
    height: 12px;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .map-tooltip {
    position: absolute;
    background: var(--ink);
    color: var(--parchment);
    padding: 0.5rem 0.8rem;
    font-size: 0.8rem;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 200px;
    line-height: 1.4;
    z-index: 100;
    font-family: 'Crimson Pro', serif;
  }

  /* INFO PANEL */
  .info-panel {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .info-card {
    background: var(--parchment-dark);
    border: 1px solid var(--parchment-shadow);
    border-left: 4px solid var(--blood);
    padding: 1.2rem;
    box-shadow: 2px 2px 10px rgba(26,18,8,0.1);

    color: var(--blood);
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.85rem;

  .info-card p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #333;
  }

  .info-card.legal {
    border-left-color: var(--union-blue);
  }

  .info-card.legal h3 { color: var(--union-blue); }

  .info-card.power {
    border-left-color: var(--free-gold);
  }

  .info-card.power h3 { color: #8a6010; }

  .info-card.class-card {
    border-left-color: var(--slave-brown);
  }

  .info-card.class-card h3 { color: var(--slave-brown); }

    background: var(--ink);
    color: var(--parchment);
    padding: 1.2rem;
    border-radius: 4px;
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.6;
    position: relative;

    content: '\201C';
    font-size: 4rem;
    color: var(--parchment-shadow);
    position: absolute;
    top: -0.5rem;
    left: 0.8rem;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .key-quote p { padding-left: 1.5rem; }
  .key-quote cite {
    display: block;
    margin-top: 0.5rem;
    padding-left: 1.5rem;
    font-size: 0.75rem;
    color: var(--parchment-shadow);
    font-style: normal;
    letter-spacing: 0.05em;
  }

  .events-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .events-list li {
    display: flex;
    gap: 0.8rem;
    font-size: 0.85rem;
    line-height: 1.4;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--parchment-shadow);
  }

  .events-list li:last-child { border-bottom: none; }

  .event-year {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--blood);
    min-width: 42px;
    font-size: 0.9rem;
  }

  .era-nav-btns {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
  }

  .nav-btn {
    flex: 1;
    padding: 0.6rem;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    border-radius: 3px;
    transition: background 0.2s;
  }

  .nav-btn:hover { background: var(--blood); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: var(--ink); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--parchment-shadow);
    margin-bottom: 0;
  }

  .progress-fill {
    height: 100%;
    background: var(--blood);
    transition: width 0.5s ease;
  }

  /* ERA TRANSITION */
  .era-content {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* State hover */
  .state-path {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .state-path:hover { opacity: 0.8; }

  .map-note {
    padding: 0.5rem 1rem;
    background: rgba(26,18,8,0.05);
    border-top: 1px solid var(--parchment-shadow);
    font-size: 0.72rem;
    color: #666;
    font-style: italic;
    text-align: center;
  }

  /* Slave count badges */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 0.6rem;
  }

  .stat-box {
    background: var(--ink);
    color: var(--parchment);
    padding: 0.5rem 0.7rem;
    border-radius: 3px;
    text-align: center;
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--parchment-shadow);
    display: block;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: rgba(245,234,214,0.6);
    line-height: 1.2;
    margin-top: 0.1rem;
    display: block;
  }
</style>

// ============================================================

async function init() {
  buildTimeline();
  try {
    const response = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
    usData = await response.json();
  } catch(e) {

  }
  renderEra(0);

// ============================================================
// TIMELINE
// ============================================================
function buildTimeline() {
  const nav = document.getElementById('timelineNav');
  ERAS.forEach((era, i) => {
    const btn = document.createElement('button');
    btn.className = 'era-btn' + (i === 0 ? ' active' : '');
    btn.onclick = () => renderEra(i);
    btn.innerHTML = `
      <div class="era-dot"></div>
      <div class="era-year">${era.shortYear}</div>
      <div class="era-label">${era.label}</div>
    `;
    nav.appendChild(btn);
  });
}

function updateTimeline(idx) {
  document.querySelectorAll('.era-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  const pct = (idx / (ERAS.length - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === ERAS.length - 1;
}

// ============================================================
// RENDER ERA
// ============================================================
function renderEra(idx) {
  currentEra = idx;
  const era = ERAS[idx];
  updateTimeline(idx);
  document.getElementById('mapTitle').textContent = era.mapTitle;
  document.getElementById('mapYearBadge').textContent = era.year;
  document.getElementById('mapNote').textContent = era.mapNote;
  renderMap(era);
  renderLegend(era);
  renderInfo(era);
}

// ============================================================
// MAP RENDERING
// ============================================================
function renderMap(era) {
  const svg = d3.select('#mainMap');
  svg.selectAll('*').remove();

  const width = 960, height = 600;
  const projection = d3.geoAlbersUsa()
    .scale(1000)
    .translate([width / 2, height / 2]);
  const path = d3.geoPath().projection(projection);

  // Ocean background
  svg.append('rect')
    .attr('width', width).attr('height', height)
    .attr('fill', '#c8dde8');

  const tooltip = document.getElementById('tooltip');
  const container = document.getElementById('map-container');

  if (usData) {
    const states = topojson.feature(usData, usData.objects.states);
    const stateAbbr = getStateAbbrMap();

    svg.selectAll('.state-path')
      .data(states.features)
      .enter()
      .append('path')
      .attr('class', 'state-path')
      .attr('d', path)
      .attr('fill', d => {
        const abbr = stateAbbr[d.id];
        return era.regionColors[abbr] || '#d4c4a0';
      })
      .attr('stroke', '#1a1208')
      .attr('stroke-width', 0.5)
      .on('mousemove', function(event, d) {
        const abbr = stateAbbr[d.id];
        const name = STATE_NAMES[abbr] || abbr;
        const tipText = era.tooltips && era.tooltips[abbr]
          ? era.tooltips[abbr]
          : name;
        const rect = container.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        tooltip.style.opacity = '1';
        tooltip.style.left = Math.min(x + 12, rect.width - 210) + 'px';
        tooltip.style.top = Math.max(y - 40, 5) + 'px';
        tooltip.innerHTML = tipText.replace(/\n/g, '<br>');
      })
      .on('mouseleave', function() {
        tooltip.style.opacity = '0';
      });

    // State borders
    svg.append('path')
      .datum(topojson.mesh(usData, usData.objects.states, (a, b) => a !== b))
      .attr('fill', 'none')
      .attr('stroke', 'rgba(26,18,8,0.4)')
      .attr('stroke-width', 0.8)
      .attr('d', path);

  } else {
    // Fallback: colored rectangle placeholder with label
    svg.append('rect')
      .attr('x', 50).attr('y', 50)
      .attr('width', 860).attr('height', 500)
      .attr('fill', '#d4c4a0')
      .attr('stroke', '#1a1208');
    svg.append('text')
      .attr('x', 480).attr('y', 300)
      .attr('text-anchor', 'middle')
      .attr('font-family', 'Crimson Pro, serif')
      .attr('font-size', '18px')
      .attr('fill', '#1a1208')
      .text('Map data loading...');
  }

  // Battle markers for Civil War era
  if (era.id === 5) {
    const battles = [
      { name: "Antietam", lat: 39.47, lon: -77.73, note: "Sept 17, 1862\nBloodiest day" },
      { name: "Gettysburg", lat: 39.83, lon: -77.23, note: "July 1-3, 1863\n51,000 casualties" },
      { name: "Vicksburg", lat: 32.35, lon: -90.88, note: "Falls July 4, 1863\nMississippi River won" },
      { name: "Fort Sumter", lat: 32.75, lon: -79.87, note: "April 12, 1861\nWar begins" },
      { name: "Appomattox", lat: 37.36, lon: -78.79, note: "April 9, 1865\nLee surrenders" }
    ];
    battles.forEach(b => {
      const projection = d3.geoAlbersUsa().scale(1000).translate([width/2, height/2]);
      const coords = projection([b.lon, b.lat]);
      if (!coords) return;
      const g = svg.append('g')
        .attr('transform', `translate(${coords[0]},${coords[1]})`)
        .style('cursor', 'pointer');
      g.append('circle')
        .attr('r', 6)
        .attr('fill', '#9b2020')
        .attr('stroke', '#f5ead6')
        .attr('stroke-width', 1.5)
        .attr('opacity', 0.9);
      g.append('circle')
        .attr('r', 10)
        .attr('fill', 'none')
        .attr('stroke', '#9b2020')
        .attr('stroke-width', 1)
        .attr('opacity', 0.5);
      g.on('mousemove', function(event) {
        const rect = container.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        tooltip.style.opacity = '1';
        tooltip.style.left = Math.min(x + 12, rect.width - 210) + 'px';
        tooltip.style.top = Math.max(y - 40, 5) + 'px';
        tooltip.innerHTML = `<strong>${b.name}</strong><br>${b.note.replace(/\n/g, '<br>')}`;
      }).on('mouseleave', () => tooltip.style.opacity = '0');
    });
  }
}

  return {
    1: "AL", 2: "AK", 4: "AZ", 5: "AR", 6: "CA", 8: "CO", 9: "CT",
    10: "DE", 12: "FL", 13: "GA", 15: "HI", 16: "ID", 17: "IL", 18: "IN",

// ============================================================
// LEGEND
// ============================================================
function renderLegend(era) {
  const el = document.getElementById('mapLegend');
  el.innerHTML = era.legend.map(item => `
    <div class="legend-item">
      <div class="legend-swatch" style="background:${item.color}"></div>
      <span>${item.label}</span>
    </div>
  `).join('');
}

// ============================================================
// INFO PANEL
// ============================================================
function renderInfo(era) {
  const panel = document.getElementById('infoPanel');
  panel.className = 'info-panel era-content';

  let html = '';

  era.info.forEach(item => {
    if (item.type === 'quote') {
      html += `
        <div class="key-quote">
          <p>${item.quote}</p>
          <cite>— ${item.cite}</cite>
        </div>`;
    } else if (item.type === 'stats') {
      html += `
        <div class="info-card">
          <h3>Civil War Numbers</h3>
          <div class="stat-grid">
            <div class="stat-box"><span class="stat-number">${item.deaths}</span><span class="stat-label">Combat Deaths</span></div>
            <div class="stat-box"><span class="stat-number">${item.enslaved}</span><span class="stat-label">Enslaved People Freed</span></div>
            <div class="stat-box"><span class="stat-number">${item.battles}</span><span class="stat-label">Engagements</span></div>
            <div class="stat-box"><span class="stat-number">${item.duration}</span><span class="stat-label">Duration</span></div>
          </div>
        </div>`;
    } else {
      const cardClass = item.type === 'legal' ? 'legal' : item.type === 'power' ? 'power' : 'class-card';
      html += `
        <div class="info-card ${cardClass}">
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </div>`;
    }
  });

  if (era.events) {
    html += `
      <div class="info-card">
        <h3>Key Events</h3>
        <ul class="events-list">
          ${era.events.map(e => `
            <li>
              <span class="event-year">${e.year}</span>
              <span>${e.text}</span>
            </li>`).join('')}
        </ul>
      </div>`;
  }

  panel.innerHTML = html;
}

// ============================================================
// NAV
// ============================================================
function changeEra(dir) {
  const next = currentEra + dir;
  if (next >= 0 && next < ERAS.length) renderEra(next);
}

// ============================================================
// START
// ============================================================
init();
</script>
